<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./style.css">
  <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <title>FarmMan Login</title>
</head>

<body>

  <div class="flex h-screen">

    <img class="hidden lg:block w-1/2"  src="https://images.pexels.com/photos/36836682/pexels-photo-36836682.jpeg" alt="">

  <div class="flex items-center justify-center  w-full lg:w-1/2">
   <div>
      <div class="w-full max-w-md">
    <div class="text-xl text-center font-bold lg:text-left">
      <span class="text-green-600">&#9650;</span>
      <span>FarmMan</span>
    </div>

    <div class="text-4xl font-bold">
      <h2>Hello,</h2>
      <h2>Welcome back</h2>
    </div>

    <form action="" class="mt-8 w-full max-w-sm space-y-4">
    <h4>Login to manage your account.</h4>
    <input
    class="border w-full px-4 py-2"
    type="email" placeholder="Email">
    <input
    class="border w-full px-4 py-2"
    type="password" placeholder="Password">
    <div class="text-blue-600 cursor-pointer hover:text-blue-400">Forget your password?

    </div>

    <button
    class="w-full bg-green-600 text-white rounded-md font-bold hover:bg-green-500 py-3 ">
     Login</button>
    </form> 
   </div>
   <div class="text-center space-y-4 mt-4">
    <span>OR</span>
    <div class="flex justify-center items-center gap-8">
      <i class="fa-brands fa-facebook text-2xl cursor-pointer"></i>
      <i class="fa-brands fa-google text-2xl cursor-pointer"></i>
      <i class="fa-brands fa-instagram text-2xl cursor-pointer"></i>
    </div>
    <div class="mt-4 text-sm text-center">don't have an account? <span class="text-blue-600 cursor-pointer">Sign up here</span></div>
   </div>
  </div>
  </div>

</body>

</html>
